<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyDrop CBD · Odoo</title>
<style>
  :root{
    --bg: #14120F; --bg-alt: #1B2019; --panel: #1F251D; --line: #33392F;
    --sage: #9BB88F; --gold: #C9A24B; --cream: #F2EDE3; --muted: #8C9186; --danger: #D9695A;
  }
  *{box-sizing:border-box;}
  body{ margin:0; background:var(--bg); color:var(--cream); font-family:'Courier New', ui-monospace, monospace; min-height:100vh; }
  header{ padding:32px 40px 20px; border-bottom:1px solid var(--line); display:flex; justify-content:space-between; align-items:flex-end; flex-wrap:wrap; gap:16px; }
  .brand{ font-family: Georgia, 'Times New Roman', serif; font-size:28px; letter-spacing:0.5px; }
  .brand span{ color:var(--sage); }
  .subtitle{ color:var(--muted); font-size:12px; text-transform:uppercase; letter-spacing:2px; margin-top:4px;}
  .tabs{ display:flex; gap:0; flex-wrap:wrap; }
  .tab{ padding:10px 18px; border:1px solid var(--line); background:transparent; color:var(--muted); cursor:pointer; font-family:inherit; font-size:12px; letter-spacing:1px; text-transform:uppercase; }
  .tab.active{ color:var(--bg); background:var(--sage); border-color:var(--sage); }
  main{ padding:32px 40px 60px; max-width:1300px; margin:0 auto; }
  .kpis{ display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:16px; margin-bottom:32px; }
  .kpi{ border:1px solid var(--line); background:var(--panel); padding:18px 20px; position:relative; }
  .kpi::before{ content:''; position:absolute; left:0; top:0; bottom:0; width:2px; background:var(--gold); }
  .kpi-label{ font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:1.5px; }
  .kpi-value{ font-family:Georgia,serif; font-size:28px; margin-top:6px; color:var(--cream); }
  .kpi-value.warn{ color:var(--danger); }
  .kpi-value.good{ color:var(--sage); }
  .panel-title{ font-size:12px; text-transform:uppercase; letter-spacing:2px; color:var(--sage); margin:36px 0 12px; padding-bottom:8px; border-bottom:1px solid var(--line); }
  table{ width:100%; border-collapse:collapse; font-size:13px; }
  th{ text-align:left; padding:10px 12px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; font-size:11px; border-bottom:1px solid var(--line); }
  td{ padding:10px 12px; border-bottom:1px solid rgba(51,57,47,0.5); }
  tr:hover td{ background:rgba(155,184,143,0.05); }
  tr.alert td{ background:rgba(217,105,90,0.08); }
  .neg{ color:var(--danger); } .pos{ color:var(--sage); }
  .badge{ display:inline-block; padding:2px 8px; border:1px solid var(--line); font-size:10px; text-transform:uppercase; letter-spacing:1px; border-radius:2px; }
  .badge.alert{ color:var(--danger); border-color:var(--danger); }
  .state{ padding:60px 0; text-align:center; color:var(--muted); font-size:13px; }
  .state.error{ color:var(--danger); }
  footer{ text-align:center; padding:24px; color:var(--muted); font-size:11px; letter-spacing:1px; }
</style>
</head>
<body>

<header>
  <div>
    <div class="brand">MyDrop <span>CBD</span></div>
    <div class="subtitle">Panel Odoo · Canales, Stock &amp; Rentabilidad</div>
  </div>
  <div class="tabs">
    <button class="tab active" data-view="stock">Stock</button>
    <button class="tab" data-view="canales">Canales</button>
    <button class="tab" data-view="productos">Productos</button>
  </div>
</header>

<main>
  <div id="kpis" class="kpis"></div>
  <div id="content"></div>
</main>

<footer>MyDrop CBD · C. Jovellanos 8, Oviedo · datos en vivo desde Odoo</footer>

<script>
const FN_URL = '/.netlify/functions/odoo-data';
let currentView = 'stock';
let salesCache = null; // canales + productos comparten el mismo fetch

document.querySelectorAll('.tab').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    currentView = btn.dataset.view;
    load();
  });
});

function fmtEUR(n){ return new Intl.NumberFormat('es-ES',{style:'currency',currency:'EUR'}).format(n||0); }
function fmtPct(n){ return (n||0).toFixed(1) + '%'; }

async function fetchType(type){
  const res = await fetch(`${FN_URL}?type=${type}`);
  const json = await res.json();
  if(!res.ok) throw new Error(json.error || 'Error desconocido');
  return json.data;
}

async function load(){
  const content = document.getElementById('content');
  const kpis = document.getElementById('kpis');
  content.innerHTML = '<div class="state">Cargando datos de Odoo…</div>';
  kpis.innerHTML = '';

  try{
    if(currentView === 'stock'){
      const data = await fetchType('stock');
      renderStock(data);
    } else {
      if(!salesCache) salesCache = await fetchType('sales');
      if(currentView === 'canales') renderCanales(salesCache);
      else renderProductos(salesCache);
    }
  }catch(err){
    content.innerHTML = `<div class="state error">⚠ ${err.message}<br><br>
      Revisa las variables de entorno de Odoo en Netlify, o los logs de la función en Logs &amp; metrics.</div>`;
  }
}

function renderStock(rows){
  const kpis = document.getElementById('kpis');
  const content = document.getElementById('content');

  const alerts = rows.filter(r=>r.alert);
  const totalUnits = rows.reduce((s,r)=>s+(r.quantity||0),0);
  const negativeCount = rows.filter(r=>r.quantity < 0).length;

  kpis.innerHTML = `
    <div class="kpi"><div class="kpi-label">Referencias con stock</div><div class="kpi-value">${rows.length}</div></div>
    <div class="kpi"><div class="kpi-label">Unidades totales</div><div class="kpi-value">${totalUnits.toFixed(0)}</div></div>
    <div class="kpi"><div class="kpi-label">⚠ Bajo stock de seguridad</div><div class="kpi-value ${alerts.length?'warn':'good'}">${alerts.length}</div></div>
    <div class="kpi"><div class="kpi-label">Stock negativo</div><div class="kpi-value ${negativeCount?'warn':'good'}">${negativeCount}</div></div>
  `;

  const sorted = [...rows].sort((a,b)=> (a.alert===b.alert? a.quantity-b.quantity : (a.alert? -1:1)));
  content.innerHTML = `
    <div class="panel-title">Detalle de stock por ubicación${!rows.some(r=>r.hasRule) ? ' (sin reglas de reposición configuradas en Odoo — umbral por defecto: 5 uds)' : ''}</div>
    <table>
      <thead><tr><th>Producto</th><th>Ubicación</th><th>Cantidad</th><th>Mínimo seguridad</th><th>Estado</th></tr></thead>
      <tbody>
        ${sorted.map(r=>`
          <tr class="${r.alert?'alert':''}">
            <td>${r.product_id ? r.product_id[1] : '—'}</td>
            <td>${r.location_id ? r.location_id[1] : '—'}</td>
            <td class="${r.quantity<0?'neg':''}">${r.quantity}</td>
            <td>${r.minQty}</td>
            <td>${r.alert ? '<span class="badge alert">Reponer</span>' : '—'}</td>
          </tr>`).join('')}
      </tbody>
    </table>
  `;
}

function renderCanales(data){
  const kpis = document.getElementById('kpis');
  const content = document.getElementById('content');
  const { channels, orders } = data;

  const totalRevenue = channels.reduce((s,c)=>s+c.revenue,0);
  const totalMargin = channels.reduce((s,c)=>s+c.margin,0);
  const totalOrders = channels.reduce((s,c)=>s+c.orders,0);

  kpis.innerHTML = `
    <div class="kpi"><div class="kpi-label">Facturación (90 días)</div><div class="kpi-value">${fmtEUR(totalRevenue)}</div></div>
    <div class="kpi"><div class="kpi-label">Margen bruto</div><div class="kpi-value good">${fmtEUR(totalMargin)}</div></div>
    <div class="kpi"><div class="kpi-label">Margen %</div><div class="kpi-value">${fmtPct(totalRevenue? totalMargin/totalRevenue*100:0)}</div></div>
    <div class="kpi"><div class="kpi-label">Pedidos</div><div class="kpi-value">${totalOrders}</div></div>
  `;

  content.innerHTML = `
    <div class="panel-title">Rentabilidad por canal</div>
    <table>
      <thead><tr><th>Canal</th><th>Pedidos</th><th>Facturación</th><th>Coste</th><th>Margen</th><th>Margen %</th></tr></thead>
      <tbody>
        ${channels.map(c=>`
          <tr>
            <td>${c.channel}</td>
            <td>${c.orders}</td>
            <td>${fmtEUR(c.revenue)}</td>
            <td>${fmtEUR(c.cost)}</td>
            <td class="pos">${fmtEUR(c.margin)}</td>
            <td>${fmtPct(c.marginPct)}</td>
          </tr>`).join('')}
      </tbody>
    </table>

    <div class="panel-title">Últimos pedidos (con canal asignado)</div>
    <table>
      <thead><tr><th>Pedido</th><th>Fecha</th><th>Cliente</th><th>Canal</th><th>Importe</th></tr></thead>
      <tbody>
        ${orders.slice(0,50).map(o=>`
          <tr>
            <td>${o.name}</td>
            <td>${(o.date_order||'').slice(0,10)}</td>
            <td>${o.partner_id ? o.partner_id[1] : '—'}</td>
            <td>${o.channel}</td>
            <td>${fmtEUR(o.amount_total)}</td>
          </tr>`).join('')}
      </tbody>
    </table>
  `;
}

function renderProductos(data){
  const kpis = document.getElementById('kpis');
  const content = document.getElementById('content');
  const { products } = data;

  const totalRevenue = products.reduce((s,p)=>s+p.revenue,0);
  const totalMargin = products.reduce((s,p)=>s+p.margin,0);
  const bestMargin = [...products].sort((a,b)=>b.marginPct-a.marginPct)[0];
  const worstMargin = [...products].filter(p=>p.revenue>0).sort((a,b)=>a.marginPct-b.marginPct)[0];

  kpis.innerHTML = `
    <div class="kpi"><div class="kpi-label">Productos vendidos (90 días)</div><div class="kpi-value">${products.length}</div></div>
    <div class="kpi"><div class="kpi-label">Margen mejor producto</div><div class="kpi-value good">${bestMargin?fmtPct(bestMargin.marginPct):'—'}</div></div>
    <div class="kpi"><div class="kpi-label">Margen peor producto</div><div class="kpi-value warn">${worstMargin?fmtPct(worstMargin.marginPct):'—'}</div></div>
    <div class="kpi"><div class="kpi-label">Margen total</div><div class="kpi-value">${fmtEUR(totalMargin)}</div></div>
  `;

  content.innerHTML = `
    <div class="panel-title">Rentabilidad por producto (90 días, ordenado por facturación)</div>
    <table>
      <thead><tr><th>Producto</th><th>Uds. vendidas</th><th>Facturación</th><th>Coste</th><th>Margen</th><th>Margen %</th></tr></thead>
      <tbody>
        ${products.slice(0,100).map(p=>`
          <tr>
            <td>${p.product}</td>
            <td>${p.qty}</td>
            <td>${fmtEUR(p.revenue)}</td>
            <td>${fmtEUR(p.cost)}</td>
            <td class="pos">${fmtEUR(p.margin)}</td>
            <td class="${p.marginPct<20?'neg':''}">${fmtPct(p.marginPct)}</td>
          </tr>`).join('')}
      </tbody>
    </table>
  `;
}

load();
</script>
</body>
</html>
