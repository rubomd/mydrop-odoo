<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyDrop CBD · Odoo</title>
<style>
  :root{
    --bg: #1A1A1A; --bg-alt: #202020; --panel: #242424; --line: #333333;
    --coral: #F9495E; --lime: #C4F935; --purple: #BB8DFC;
    --cream: #ECECE9; --muted: #8A8E8A; --light: #CCCECC; --danger: #F9495E;
  }
  *{box-sizing:border-box;}
  body{ margin:0; background:var(--bg); color:var(--cream); font-family:'Inter', ui-sans-serif, sans-serif; min-height:100vh; }
  header{ padding:28px 40px 16px; border-bottom:1px solid var(--line); display:flex; justify-content:space-between; align-items:flex-end; flex-wrap:wrap; gap:16px; }
  .brand{ font-family:'Delight', 'Inter', sans-serif; font-weight:500; font-size:28px; letter-spacing:-0.5px; }
  .brand span{ color:var(--lime); }
  .subtitle{ color:var(--muted); font-family:'IBM Plex Sans', monospace; font-size:11px; text-transform:uppercase; letter-spacing:2px; margin-top:4px;}
  .tabs{ display:flex; gap:0; flex-wrap:wrap; }
  .tab{ padding:9px 16px; border:1px solid var(--line); background:transparent; color:var(--muted); cursor:pointer; font-family:'IBM Plex Sans', monospace; font-size:11px; letter-spacing:1px; text-transform:uppercase; }
  .tab.active{ color:var(--bg); background:var(--lime); border-color:var(--lime); font-weight:600; }

  .filterbar{ padding:16px 40px; border-bottom:1px solid var(--line); display:flex; gap:8px; flex-wrap:wrap; align-items:center; background:var(--bg-alt); }
  .fbtn{ padding:7px 14px; border:1px solid var(--line); background:transparent; color:var(--muted); cursor:pointer; font-family:'IBM Plex Sans', monospace; font-size:11px; letter-spacing:0.5px; }
  .fbtn.active{ color:var(--bg); background:var(--lime); border-color:var(--lime); font-weight:600; }
  .fbtn input[type=date]{ background:var(--panel); color:var(--cream); border:1px solid var(--line); font-family:inherit; font-size:11px; padding:4px; }
  .filter-note{ color:var(--muted); font-family:'IBM Plex Sans', monospace; font-size:11px; margin-left:8px; }

  main{ padding:28px 40px 60px; max-width:1300px; margin:0 auto; }
  .kpis{ display:grid; grid-template-columns:repeat(auto-fit,minmax(190px,1fr)); gap:16px; margin-bottom:28px; }
  .kpi{ border:1px solid var(--line); background:var(--panel); padding:16px 18px; position:relative; }
  .kpi::before{ content:''; position:absolute; left:0; top:0; bottom:0; width:3px; background:var(--lime); }
  .kpi-label{ font-family:'IBM Plex Sans', monospace; font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:1.5px; }
  .kpi-value{ font-family:'Delight', 'Inter', sans-serif; font-weight:500; font-size:26px; margin-top:6px; color:var(--cream); }
  .kpi-value.warn{ color:var(--coral); } .kpi-value.good{ color:var(--lime); }
  .panel-title{ font-family:'IBM Plex Sans', monospace; font-size:12px; text-transform:uppercase; letter-spacing:2px; color:var(--lime); margin:32px 0 12px; padding-bottom:8px; border-bottom:1px solid var(--line); }
  table{ width:100%; border-collapse:collapse; font-size:13px; font-family:'IBM Plex Sans', monospace; }
  th{ text-align:left; padding:9px 12px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; font-size:10px; border-bottom:1px solid var(--line); }
  td{ padding:9px 12px; border-bottom:1px solid rgba(51,51,51,0.5); }
  tr:hover td{ background:rgba(187,141,252,0.06); }
  tr.alert td{ background:rgba(249,73,94,0.10); }
  .neg{ color:var(--coral); } .pos{ color:var(--lime); }
  .badge{ display:inline-block; padding:2px 8px; border:1px solid var(--line); font-size:10px; text-transform:uppercase; letter-spacing:1px; }
  .badge.alert{ color:var(--coral); border-color:var(--coral); }
  .badge.muted{ color:var(--muted); }
  .up{ color:var(--lime); } .down{ color:var(--coral); }
  .state{ padding:60px 0; text-align:center; color:var(--muted); font-family:'IBM Plex Sans', monospace; font-size:13px; }
  .state.error{ color:var(--coral); }
  .infobox{ border:1px solid var(--line); background:var(--panel); padding:12px 16px; font-family:'IBM Plex Sans', monospace; font-size:12px; color:var(--muted); margin-bottom:20px; }
  footer{ text-align:center; padding:24px; color:var(--muted); font-family:'IBM Plex Sans', monospace; font-size:11px; letter-spacing:1px; }

  /* Esquinas redondeadas MyDrop */
  .kpi, .tab, .fbtn, .badge, .infobox, .bank-card, select{ border-radius:10px; }
  .tab:first-child{ border-radius:10px 0 0 10px; }
  .tab:last-child{ border-radius:0 10px 10px 0; }
  .badge{ border-radius:6px; }
  .bank-grid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:16px; }
  .bank-card{ border:1px solid var(--line); background:var(--panel); padding:18px 20px; }
  .bank-card.total{ background:var(--bg-alt); }
  .bank-name{ font-family:'IBM Plex Sans',sans-serif; font-size:12px; text-transform:uppercase; letter-spacing:1px; color:var(--cream); }
  .bank-account{ font-family:'IBM Plex Sans',sans-serif; font-size:11px; color:var(--muted); margin-top:2px; }
  .bank-balance{ font-family:'Delight','Inter',sans-serif; font-weight:500; font-size:28px; margin-top:12px; color:var(--lime); }
  .bank-balance.neg{ color:var(--coral); }
</style>
</head>
<body>

<header>
  <div>
    <div class="brand">MyDrop <span>CBD</span></div>
    <div class="subtitle">Panel Odoo · Canales, Stock &amp; Rentabilidad</div>
  </div>
  <div class="tabs">
    <button class="tab active" data-view="canales">Canales</button>
    <button class="tab" data-view="b2b">Ranking B2B</button>
    <button class="tab" data-view="productos">Top Productos</button>
    <button class="tab" data-view="stock">Stock</button>
    <button class="tab" data-view="bancos">Bancos</button>
    <button class="tab" data-view="diag">Diagnóstico</button>
  </div>
</header>

<div class="filterbar" id="filterbar" style="display:flex;">
  <button class="fbtn" data-preset="semana">Esta semana (Lun-Dom)</button>
  <button class="fbtn" data-preset="mes">Este mes</button>
  <button class="fbtn active" data-preset="mesvsmes">Mes vs mes anterior</button>
  <button class="fbtn" data-preset="30d">Últimos 30 días</button>
  <button class="fbtn" data-preset="custom">
    Personalizado: <input type="date" id="dateFrom"> a <input type="date" id="dateTo">
  </button>
  <span class="filter-note" id="filterNote"></span>
</div>

<main>
  <div id="kpis" class="kpis"></div>
  <div id="content"></div>
</main>

<footer>MyDrop CBD · C. Jovellanos 8, Oviedo · datos en vivo desde Odoo</footer>

<script>
const FN_URL = '/.netlify/functions/odoo-data';
let currentView = 'canales';
let salesCache = null;
let currentPreset = 'mesvsmes';

document.querySelectorAll('.tab').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    currentView = btn.dataset.view;
    document.getElementById('filterbar').style.display = (currentView==='stock' || currentView==='diag' || currentView==='bancos') ? 'none' : 'flex';
    load();
  });
});

document.querySelectorAll('.fbtn[data-preset]').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    currentPreset = btn.dataset.preset;
    renderCurrentTab();
  });
});
document.getElementById('dateFrom').addEventListener('change', ()=>{ currentPreset='custom'; setActivePreset('custom'); renderCurrentTab(); });
document.getElementById('dateTo').addEventListener('change', ()=>{ currentPreset='custom'; setActivePreset('custom'); renderCurrentTab(); });
function setActivePreset(p){ document.querySelectorAll('.fbtn').forEach(b=>b.classList.toggle('active', b.dataset.preset===p)); }

function fmtEUR(n){ return new Intl.NumberFormat('es-ES',{style:'currency',currency:'EUR'}).format(n||0); }
function fmtPct(n){ return (n||0).toFixed(1) + '%'; }

function getRange(preset){
  const now = new Date();
  if(preset === 'semana'){
    const day = (now.getDay()+6)%7;
    const monday = new Date(now); monday.setDate(now.getDate()-day); monday.setHours(0,0,0,0);
    const sunday = new Date(monday); sunday.setDate(monday.getDate()+6);
    return { from: monday, to: sunday, label: 'Esta semana (Lun-Dom)' };
  }
  if(preset === 'mes'){
    const first = new Date(now.getFullYear(), now.getMonth(), 1);
    return { from: first, to: now, label: 'Este mes' };
  }
  if(preset === '30d'){
    const from = new Date(now); from.setDate(now.getDate()-30);
    return { from, to: now, label: 'Últimos 30 días' };
  }
  if(preset === 'custom'){
    const f = document.getElementById('dateFrom').value;
    const t = document.getElementById('dateTo').value;
    if(!f || !t) return { from: new Date(now.getFullYear(),now.getMonth(),1), to: now, label:'Rango personalizado (define ambas fechas)' };
    return { from: new Date(f), to: new Date(t+'T23:59:59'), label: `${f} a ${t}` };
  }
  return null;
}
function getMonthVsMonth(){
  const now = new Date();
  const curFrom = new Date(now.getFullYear(), now.getMonth(), 1);
  const curTo = now;
  const prevFrom = new Date(now.getFullYear(), now.getMonth()-1, 1);
  const prevTo = new Date(now.getFullYear(), now.getMonth(), 0);
  return { curFrom, curTo, prevFrom, prevTo };
}
function inRange(dateStr, from, to){ const d = new Date(dateStr); return d >= from && d <= to; }

async function fetchType(type){
  const res = await fetch(`${FN_URL}?type=${type}`);
  const json = await res.json();
  if(!res.ok) throw new Error(json.error || 'Error desconocido');
  return json.data;
}

async function load(){
  const content = document.getElementById('content');
  const kpis = document.getElementById('kpis');
  content.innerHTML = '<div class="state">Cargando datos de Odoo…</div>';
  kpis.innerHTML = '';
  try{
    if(currentView === 'stock'){
      const data = await fetchType('stock');
      renderStock(data);
    } else if(currentView === 'bancos'){
      const data = await fetchType('bank');
      renderBank(data);
    } else if(currentView === 'diag'){
      const data = await fetchType('diag');
      renderDiag(data);
    } else {
      if(!salesCache) salesCache = await fetchType('sales');
      renderCurrentTab();
    }
  }catch(err){
    content.innerHTML = `<div class="state error">⚠ ${err.message}<br><br>Revisa las variables de entorno de Odoo en Netlify, o los logs de la función.</div>`;
  }
}

function renderDiag(d){
  const kpis = document.getElementById('kpis');
  const content = document.getElementById('content');
  kpis.innerHTML = '';
  const pre = (obj) => `<pre style="white-space:pre-wrap; font-size:12px; color:var(--cream); background:var(--panel); padding:16px; border:1px solid var(--line); font-family:'IBM Plex Sans',monospace;">${JSON.stringify(obj, null, 2)}</pre>`;
  content.innerHTML = `
    <div class="panel-title">Categorías de producto (product.category)</div>
    ${pre(d.productCategories)}
    <div class="panel-title">Muestra de productos con stock (categoría, tipo, referencia)</div>
    ${pre(d.productsSample)}
    <div class="panel-title">Búsqueda de clientes con "online" en el nombre</div>
    ${pre(d.onlinePartnerSearch)}
    <div class="panel-title">Pedidos de esos clientes (si los hay)</div>
    ${pre(d.onlinePartnerOrders)}
    <div class="panel-title">Etiquetas de cliente disponibles (res.partner.category)</div>
    ${pre(d.partnerTags)}
    <div class="panel-title">Últimos 20 pedidos con equipo + etiquetas del cliente</div>
    ${pre(d.recentOrdersWithTags)}
    <div class="panel-title">Equipos de venta</div>
    ${pre(d.teams)}
  `;
}

function renderBank(rows){
  const kpis = document.getElementById('kpis');
  const content = document.getElementById('content');
  kpis.innerHTML = '';
  if(!rows.length){
    content.innerHTML = `<div class="panel-title">Saldos bancarios</div><div class="state">No se han encontrado diarios de banco/caja en Odoo.</div>`;
    return;
  }
  const total = rows.reduce((s,r)=>s+(r.balance||0),0);
  content.innerHTML = `
    <div class="panel-title">Saldos bancarios</div>
    <div class="bank-grid">
      <div class="bank-card total">
        <div class="bank-name">Saldo total</div>
        <div class="bank-account">${rows.length} cuenta${rows.length===1?'':'s'}</div>
        <div class="bank-balance ${total<0?'neg':''}">${fmtEUR(total)}</div>
      </div>
      ${rows.map(r=>`
        <div class="bank-card">
          <div class="bank-name">${r.name}</div>
          <div class="bank-account">${r.account_name}</div>
          <div class="bank-balance ${r.balance<0?'neg':''}">${fmtEUR(r.balance)}</div>
        </div>
      `).join('')}
    </div>`;
}

function renderCurrentTab(){
  if(!salesCache) return;
  if(currentView === 'canales') renderCanales();
  else if(currentView === 'productos') renderProductos();
  else if(currentView === 'b2b') renderB2B();
}

// --- STOCK ---
let stockCache = null;
let stockFilters = { warehouse: 'todos', category: 'todas', type: 'todos' };

function renderStock(rows){
  stockCache = rows;
  renderStockFiltered();
}

function renderStockFiltered(){
  const rows = stockCache;
  const kpis = document.getElementById('kpis');
  const content = document.getElementById('content');

  const warehouses = [...new Set(rows.map(r=>r.warehouse))].sort();
  const categories = [...new Set(rows.map(r=>r.category))].sort();
  const types = [...new Set(rows.map(r=>r.productType))].sort();

  const filtered = rows.filter(r =>
    (stockFilters.warehouse==='todos' || r.warehouse===stockFilters.warehouse) &&
    (stockFilters.category==='todas' || r.category===stockFilters.category) &&
    (stockFilters.type==='todos' || r.productType===stockFilters.type)
  );

  const alerts = filtered.filter(r=>r.alert);
  const totalUnits = filtered.reduce((s,r)=>s+(r.quantity||0),0);
  const negativeCount = filtered.filter(r=>r.quantity < 0).length;

  kpis.innerHTML = `
    <div class="kpi"><div class="kpi-label">Referencias con stock</div><div class="kpi-value">${filtered.length}</div></div>
    <div class="kpi"><div class="kpi-label">Unidades totales</div><div class="kpi-value">${totalUnits.toFixed(0)}</div></div>
    <div class="kpi"><div class="kpi-label">⚠ Bajo stock seguridad</div><div class="kpi-value ${alerts.length?'warn':'good'}">${alerts.length}</div></div>
    <div class="kpi"><div class="kpi-label">Stock negativo</div><div class="kpi-value ${negativeCount?'warn':'good'}">${negativeCount}</div></div>`;

  const sorted = [...filtered].sort((a,b)=> (a.alert===b.alert? a.quantity-b.quantity : (a.alert? -1:1)));

  const selectHtml = (id, label, options, current) => `
    <div>
      <label style="display:block; font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:4px;">${label}</label>
      <select id="${id}" style="background:var(--panel); color:var(--cream); border:1px solid var(--line); font-family:'IBM Plex Sans',sans-serif; font-size:12px; padding:6px 10px;">
        <option value="${label==='Almacén'?'todos':label==='Categoría'?'todas':'todos'}">Todos</option>
        ${options.map(o=>`<option value="${o}" ${o===current?'selected':''}>${o}</option>`).join('')}
      </select>
    </div>`;

  content.innerHTML = `
    <div style="display:flex; gap:20px; flex-wrap:wrap; margin-bottom:24px; padding:16px; border:1px solid var(--line); background:var(--bg-alt);">
      ${selectHtml('filterWarehouse','Almacén', warehouses, stockFilters.warehouse)}
      ${selectHtml('filterCategory','Categoría', categories, stockFilters.category)}
      ${selectHtml('filterType','Tipo', types, stockFilters.type)}
    </div>
    <div class="panel-title">Detalle de stock${!rows.some(r=>r.hasRule) ? ' (sin reglas de reposición en Odoo — umbral por defecto: 5 uds)' : ''}</div>
    <table><thead><tr><th>Producto</th><th>Categoría</th><th>Tipo</th><th>Almacén</th><th>Cantidad</th><th>Mínimo seguridad</th><th>Estado</th></tr></thead>
    <tbody>${sorted.map(r=>`<tr class="${r.alert?'alert':''}">
      <td>${r.product_id?r.product_id[1]:'—'}</td><td>${r.category}</td><td>${r.productType}</td><td>${r.warehouse}</td>
      <td class="${r.quantity<0?'neg':''}">${r.quantity}</td><td>${r.minQty}</td>
      <td>${r.alert?'<span class="badge alert">Reponer</span>':'—'}</td></tr>`).join('')}</tbody></table>`;

  document.getElementById('filterWarehouse').addEventListener('change', e=>{ stockFilters.warehouse = e.target.value; renderStockFiltered(); });
  document.getElementById('filterCategory').addEventListener('change', e=>{ stockFilters.category = e.target.value; renderStockFiltered(); });
  document.getElementById('filterType').addEventListener('change', e=>{ stockFilters.type = e.target.value; renderStockFiltered(); });
}

// --- CANALES ---
function gijonLast(arr, getKey){
  const key = getKey || (x=>x);
  const idx = arr.findIndex(x => key(x) === 'Franquicia Gijón');
  if(idx > -1){ const [item] = arr.splice(idx,1); arr.push(item); }
  return arr;
}

function computeChannelTotals(orders, lines, from, to){
  const inSet = new Set(orders.filter(o=>inRange(o.date_order, from, to)).map(o=>o.id));
  const chanByOrder = {};
  orders.forEach(o=>{ chanByOrder[o.id]=o.channel; });
  const agg = {};
  orders.forEach(o=>{
    if(!inSet.has(o.id)) return;
    if(!agg[o.channel]) agg[o.channel] = { channel:o.channel, orders:0, revenue:0, cost:0 };
    agg[o.channel].orders++;
    agg[o.channel].revenue += o.amount_total||0;
  });
  lines.forEach(l=>{
    if(!inSet.has(l.order_id)) return;
    const ch = chanByOrder[l.order_id];
    if(!ch || !agg[ch]) return;
    agg[ch].cost += l.cost||0;
  });
  return Object.values(agg).map(c=>({...c, margin:c.revenue-c.cost, marginPct: c.revenue? (c.revenue-c.cost)/c.revenue*100:0}));
}

function renderCanales(){
  const kpis = document.getElementById('kpis');
  const content = document.getElementById('content');
  const { orders, lines } = salesCache;
  const note = document.getElementById('filterNote');

  const onlineNote = `<div class="infobox">Todas las cifras son <strong>sin IVA</strong> (base imponible). La <strong>Tienda Online</strong> se registra en Odoo a mano bajo el cliente <strong>CLIENTE WEB</strong> — ya está incluida en estos datos.</div>`;

  if(currentPreset === 'mesvsmes'){
    const { curFrom, curTo, prevFrom, prevTo } = getMonthVsMonth();
    note.textContent = `${curFrom.toLocaleDateString('es-ES',{month:'long',year:'numeric'})} vs ${prevFrom.toLocaleDateString('es-ES',{month:'long',year:'numeric'})}`;
    const cur = computeChannelTotals(orders, lines, curFrom, curTo);
    const prev = computeChannelTotals(orders, lines, prevFrom, prevTo);
    const prevByChannel = {}; prev.forEach(p=>{ prevByChannel[p.channel]=p; });
    const allChannels = gijonLast([...new Set([...cur.map(c=>c.channel), ...prev.map(c=>c.channel)])]);

    const totalCur = cur.reduce((s,c)=>s+c.revenue,0);
    const totalPrev = prev.reduce((s,c)=>s+c.revenue,0);
    const change = totalPrev? ((totalCur-totalPrev)/totalPrev*100) : 0;

    kpis.innerHTML = `
      <div class="kpi"><div class="kpi-label">Facturación mes actual</div><div class="kpi-value">${fmtEUR(totalCur)}</div></div>
      <div class="kpi"><div class="kpi-label">Facturación mes anterior</div><div class="kpi-value">${fmtEUR(totalPrev)}</div></div>
      <div class="kpi"><div class="kpi-label">Variación</div><div class="kpi-value ${change>=0?'good':'warn'}">${change>=0?'+':''}${fmtPct(change)}</div></div>
      <div class="kpi"><div class="kpi-label">Margen mes actual</div><div class="kpi-value good">${fmtEUR(cur.reduce((s,c)=>s+c.margin,0))}</div></div>`;

    content.innerHTML = onlineNote + `
      <div class="panel-title">Ventas por canal — mes actual vs mes anterior</div>
      <table><thead><tr><th>Canal</th><th>Mes actual</th><th>Mes anterior</th><th>Variación</th><th>Margen actual</th><th>Margen %</th></tr></thead>
      <tbody>${allChannels.map(ch=>{
        const c = cur.find(x=>x.channel===ch) || {revenue:0,margin:0,marginPct:0};
        const p = prevByChannel[ch] || {revenue:0,margin:0};
        const pct = p.revenue? ((c.revenue-p.revenue)/p.revenue*100) : (c.revenue>0?100:0);
        return `<tr><td>${ch}</td><td>${fmtEUR(c.revenue)}</td><td>${fmtEUR(p.revenue)}</td>
          <td><span class="${pct>=0?'up':'down'}">${pct>=0?'▲':'▼'} ${fmtPct(Math.abs(pct))}</span></td>
          <td class="pos">${fmtEUR(c.margin)}</td><td>${fmtPct(c.marginPct)}</td></tr>`;
      }).join('')}</tbody></table>`;
    return;
  }

  const range = getRange(currentPreset);
  note.textContent = range.label;
  const totals = computeChannelTotals(orders, lines, range.from, range.to);
  const totalRevenue = totals.reduce((s,c)=>s+c.revenue,0);
  const totalMargin = totals.reduce((s,c)=>s+c.margin,0);
  const totalOrders = totals.reduce((s,c)=>s+(c.orders||0),0);
  const sortedTotals = gijonLast(totals.sort((a,b)=>b.revenue-a.revenue), c=>c.channel);

  kpis.innerHTML = `
    <div class="kpi"><div class="kpi-label">Facturación</div><div class="kpi-value">${fmtEUR(totalRevenue)}</div></div>
    <div class="kpi"><div class="kpi-label">Margen bruto</div><div class="kpi-value good">${fmtEUR(totalMargin)}</div></div>
    <div class="kpi"><div class="kpi-label">Margen %</div><div class="kpi-value">${fmtPct(totalRevenue? totalMargin/totalRevenue*100:0)}</div></div>
    <div class="kpi"><div class="kpi-label">Pedidos</div><div class="kpi-value">${totalOrders}</div></div>`;

  content.innerHTML = onlineNote + `
    <div class="panel-title">Ventas por canal — ${range.label}</div>
    <table><thead><tr><th>Canal</th><th>Pedidos</th><th>Facturación</th><th>Coste</th><th>Margen</th><th>Margen %</th></tr></thead>
    <tbody>${sortedTotals.map(c=>`<tr>
      <td>${c.channel}</td><td>${c.orders!=null?c.orders:'—'}</td><td>${fmtEUR(c.revenue)}</td><td>${fmtEUR(c.cost)}</td>
      <td class="pos">${fmtEUR(c.margin)}</td><td>${fmtPct(c.marginPct)}</td></tr>`).join('')}</tbody></table>`;
}

// --- TOP PRODUCTOS ---
function renderProductos(){
  const kpis = document.getElementById('kpis');
  const content = document.getElementById('content');
  const { orders, lines } = salesCache;
  const note = document.getElementById('filterNote');

  let from, to, label;
  if(currentPreset === 'mesvsmes'){
    const { curFrom, curTo } = getMonthVsMonth();
    from = curFrom; to = curTo; label = 'Este mes';
  } else {
    const range = getRange(currentPreset);
    from = range.from; to = range.to; label = range.label;
  }
  note.textContent = label;

  const validOrderIds = new Set(orders.filter(o=>inRange(o.date_order, from, to)).map(o=>o.id));
  const agg = {};
  lines.forEach(l=>{
    if(!validOrderIds.has(l.order_id)) return;
    if(!agg[l.product]) agg[l.product] = { product:l.product, qty:0, revenue:0, cost:0 };
    agg[l.product].qty += l.qty;
    agg[l.product].revenue += l.revenue;
    agg[l.product].cost += l.cost;
  });
  const products = Object.values(agg).map(p=>({...p, margin:p.revenue-p.cost, marginPct:p.revenue?(p.revenue-p.cost)/p.revenue*100:0}))
    .sort((a,b)=>b.qty-a.qty).slice(0,20);

  const totalQty = products.reduce((s,p)=>s+p.qty,0);
  const totalRevenue = products.reduce((s,p)=>s+p.revenue,0);

  kpis.innerHTML = `
    <div class="kpi"><div class="kpi-label">Top 20 · Unidades vendidas</div><div class="kpi-value">${totalQty.toFixed(0)}</div></div>
    <div class="kpi"><div class="kpi-label">Facturación top 20</div><div class="kpi-value">${fmtEUR(totalRevenue)}</div></div>
    <div class="kpi"><div class="kpi-label">Margen top 20</div><div class="kpi-value good">${fmtEUR(products.reduce((s,p)=>s+p.margin,0))}</div></div>`;

  content.innerHTML = `
    <div class="panel-title">Top 20 productos más vendidos — ${label}</div>
    <table><thead><tr><th>#</th><th>Producto</th><th>Uds.</th><th>Facturación</th><th>Margen</th><th>Margen %</th></tr></thead>
    <tbody>${products.map((p,i)=>`<tr><td>${i+1}</td><td>${p.product}</td><td>${p.qty}</td>
      <td>${fmtEUR(p.revenue)}</td><td class="pos">${fmtEUR(p.margin)}</td>
      <td class="${p.marginPct<20?'neg':''}">${fmtPct(p.marginPct)}</td></tr>`).join('')}</tbody></table>`;
}

// --- RANKING B2B ---
function renderB2B(){
  const kpis = document.getElementById('kpis');
  const content = document.getElementById('content');
  const { orders } = salesCache;
  const note = document.getElementById('filterNote');

  let from, to, label;
  if(currentPreset === 'mesvsmes'){
    const { curFrom, curTo } = getMonthVsMonth();
    from = curFrom; to = curTo; label = 'Este mes';
  } else {
    const range = getRange(currentPreset);
    from = range.from; to = range.to; label = range.label;
  }
  note.textContent = label;

  const b2bOrders = orders.filter(o=>o.channel==='B2B' && inRange(o.date_order, from, to));
  const agg = {};
  b2bOrders.forEach(o=>{
    const key = o.partner || 'Sin cliente';
    if(!agg[key]) agg[key] = { partner:key, orders:0, revenue:0 };
    agg[key].orders++;
    agg[key].revenue += o.amount_total||0;
  });
  const clients = Object.values(agg).sort((a,b)=>b.revenue-a.revenue);
  const totalRevenue = clients.reduce((s,c)=>s+c.revenue,0);

  kpis.innerHTML = `
    <div class="kpi"><div class="kpi-label">Clientes B2B activos</div><div class="kpi-value">${clients.length}</div></div>
    <div class="kpi"><div class="kpi-label">Facturación B2B</div><div class="kpi-value">${fmtEUR(totalRevenue)}</div></div>
    <div class="kpi"><div class="kpi-label">Ticket medio</div><div class="kpi-value">${fmtEUR(clients.length? totalRevenue/b2bOrders.length:0)}</div></div>`;

  content.innerHTML = `
    <div class="panel-title">Ranking clientes B2B — ${label}</div>
    <table><thead><tr><th>#</th><th>Cliente</th><th>Pedidos</th><th>Facturación</th><th>% del total B2B</th></tr></thead>
    <tbody>${clients.map((c,i)=>`<tr><td>${i+1}</td><td>${c.partner}</td><td>${c.orders}</td>
      <td>${fmtEUR(c.revenue)}</td><td>${fmtPct(totalRevenue? c.revenue/totalRevenue*100:0)}</td></tr>`).join('')}</tbody></table>`;
}

load();
</script>
